name: Release on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 按你的项目实际情况替换
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package release asset
        run: |
          mkdir -p release
          cp -r dist/* release/ || true
          tar -czf multipost-${GITHUB_REF_NAME}.tar.gz release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: multipost-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
